<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordWise</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>📖 WordWise</h1>
    </header>

    <main>
        <section>
            <input type="text" id="searchInput" placeholder="Escribe una palabra en inglés...">
            <button id="searchBtn">Buscar</button>
        </section>

        <nav>
            <button class="tab active" data-tab="definiciones">Definiciones</button>
            <button class="tab" data-tab="sinonimos">Sinónimos</button>
        </nav>

        <div id="resultContainer">
            <p>Escribe una palabra para buscar su definición</p>
        </div>
    </main>

    <footer>
        <p>WordWise · Diccionario en inglés</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
